resources:
  jobs:
    rendering_demo:
      name: "[${bundle.target}] KiCad Rendering Demo"
      tasks:
        - task_key: render
          notebook_task:
            notebook_path: ../src/notebooks/04_rendering_demo.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - ../dist/*.whl
