resources:
  jobs:
    ingest_open_schematics:
      name: "[${bundle.target}] Ingest open-schematics to Delta"
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ../src/notebooks/01_ingest_open_schematics.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - ../dist/*.whl
