resources:
  jobs:
    ingest_open_schematics:
      name: "[${bundle.target}] Ingest open-schematics to Delta"
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ../src/notebooks/01_ingest_open_schematics.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode
