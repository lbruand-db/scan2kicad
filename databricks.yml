bundle:
  name: scan2kicad

workspace:
  host: ${var.databricks_host}

variables:
  databricks_host:
    description: Databricks workspace URL
  catalog:
    default: lucasbruand_catalog
  schema:
    default: kicad

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
