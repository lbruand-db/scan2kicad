bundle:
  name: scan2kicad

workspace:
  host: https://e2-demo-field-eng.cloud.databricks.com

variables:
  catalog:
    default: lucasbruand_catalog
  schema:
    default: kicad

include:
  - resources/*.yml

artifacts:
  scan2kicad_wheel:
    type: whl
    path: .
    build: uv build --wheel

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
