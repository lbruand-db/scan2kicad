name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - name: Run ty (warnings expected for GPU/Spark deps)
        run: |
          set +e
          output=$(uv run ty check src/scan2kicad/ 2>&1)
          rc=$?
          echo "$output"
          # Exit code 2+ = config/hard errors
          if [ $rc -ge 2 ]; then exit $rc; fi
          # Fail only if output contains actual errors (not warnings)
          if echo "$output" | grep -q "^error"; then exit 1; fi
          exit 0

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -v
